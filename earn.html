<!DOCTYPE html>    
<html lang="en">    
<head>    
<meta charset="UTF-8" />    
<meta name="viewport" content="width=device-width, initial-scale=1.0" />    
<title>Quantum Apex Robot - Quantum Apex</title>    
    
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>    
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>    
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>    
    
<style>    
body { margin:0; font-family:Arial,sans-serif; background:#0f172a; color:white; }    
.container { max-width:960px; margin:0 auto; padding:1rem; }    
    
.card { background:#1e293b; border-radius:16px; padding:2rem; margin-bottom:1.5rem; box-shadow:0 4px 10px rgba(0,0,0,0.3); }    
.section-title { font-size:20px; font-weight:bold; color:#94a3b8; display:flex; align-items:center; gap:0.5rem; }    
.back-btn { position:fixed; top:1rem; right:1rem; background:#ef4444; color:white; padding:0.6rem 1.2rem; border-radius:8px; font-weight:bold; }    
.notification { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#1e293b; padding:1rem 2rem; border-radius:12px; font-weight:bold; color:#facc15; display:none; z-index:1000; }    
.balance { margin-top:0.5rem; font-weight:bold; color:#f59e0b; }    
.purchase-btn { background:#2563eb; color:white; padding:0.6rem 1.2rem; border-radius:8px; font-weight:bold; }    
.purchase-btn.active { background:#16a34a; cursor:default; }    
.plan-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:1rem; margin-top:1rem; }    
.plan-card { background:#1e293b; border-radius:16px; padding:1.5rem; }    
.trade-btn { background:#16a34a; color:white; padding:0.8rem; border-radius:8px; font-weight:bold; width:100%; margin-top:0.8rem; }    
.trade-btn.disabled { background:#555; cursor:not-allowed; }    
.trade-btn.active { background:#0ea5e9; }    
.countdown { font-weight:bold; color:#10b981; margin-top:0.5rem; }    
    
.robot-card {    
  background: linear-gradient(135deg, #0f766e, #14b8a6);    
  border-radius:16px;    
  padding:1rem 1.5rem;    
  display:flex;    
  justify-content:space-between;    
  align-items:center;    
  height:4cm;    
  box-shadow:0 4px 10px rgba(0,0,0,0.4);    
  color:white;    
  gap:1rem;    
}    
.robot-info {    
  display:flex;    
  flex-direction:column;    
  justify-content:center;    
  gap:0.3rem;    
}    
.robot-info p { margin:0; }    
.robot-price { font-weight:bold; color:#facc15; }    
.robot-desc { font-size:0.85rem; color:#d1d5db; }    
.robot-button {    
  background:white; color:#0f172a; border:none; padding:0.6rem 1rem; border-radius:8px; font-weight:bold; cursor:pointer;    
}    
.robot-icon {    
  width:60px;    
  height:60px;    
  flex-shrink:0;    
  background:#e2e8f0;    
  border-radius:50%;    
  display:flex;    
  align-items:center;    
  justify-content:center;    
  font-size:2rem;    
  color:#0f172a;    
}    
</style>    
</head>    
    
<body>    
<button class="back-btn" onclick="location.href='dashboard.html'">Back</button>    
<div class="notification" id="notification"></div>    
    
<div class="container">    
<div class="section-title"><span style="font-size:2rem;">🤖</span> Quantum Apex Robot</div>    
    
<div class="robot-card">    
<div class="robot-icon">🤖</div>    
<div class="robot-info">    
<p class="robot-title">Quantum Apex Robot</p>    
<p class="robot-price">Price: $150</p>    
<p class="robot-desc">Advanced AI trading for crypto, forex & binary markets. Potential ROI up to 20% in 3 days.</p>    
</div>    
<button id="purchaseRobot" class="robot-button">Purchase Robot 🤖</button>    
</div>    
    
<p class="balance" id="userBalance">Balance: $0</p>    
<div id="plansContainer" class="plan-grid"></div>    
</div>    
    
<script type="module">    
    
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";    
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";    
import { getDatabase,ref,get,set,push,update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";    
    
const app = initializeApp({    
apiKey:"AIzaSyDaEphuY2kQue8m-20DDs68JDgQirAycBE",    
authDomain:"digital-wallet-40297.firebaseapp.com",    
databaseURL:"https://digital-wallet-40297-default-rtdb.europe-west1.firebasedatabase.app",    
projectId:"digital-wallet-40297"    
});    
    
const auth=getAuth(app);    
const db=getDatabase(app);    
    
const plans=[    
{ pair:'EURUSD', price:100, payout:120, days:3 },    
{ pair:'GBPUSD', price:200, payout:240, days:3 },    
{ pair:'USDJPY', price:400, payout:480, days:3 },    
{ pair:'AUDUSD', price:600, payout:720, days:3 },    
{ pair:'USDCAD', price:800, payout:960, days:3 },    
{ pair:'NZDUSD', price:1000, payout:1200, days:3 },    
{ pair:'EURGBP', price:2000, payout:2400, days:3 },    
{ pair:'EURJPY', price:4000, payout:5300, days:3 },    
{ pair:'GBPJPY', price:6000, payout:8000, days:3 },    
{ pair:'USDCHF', price:8000, payout:12000, days:3 },    
{ pair:'BTCUSD', price:10000, payout:16000, days:3 }    
];    
    
const plansContainer=document.getElementById("plansContainer");    
const purchaseBtn=document.getElementById("purchaseRobot");    
const userBalanceEl=document.getElementById("userBalance");    
const notification=document.getElementById("notification");    
    
const notify=(msg)=>{    
notification.innerText=msg;    
notification.style.display="block";    
setTimeout(()=>notification.style.display="none",2500);    
};    
    
onAuthStateChanged(auth,async user=>{    
    
if(!user) return location.href="login.html";    
    
const userRef=ref(db,"users/"+user.uid);    
const payoutsRef=ref(db,"payouts/"+user.uid);    
    
const userSnap=await get(userRef);    
let userData=userSnap.val()||{};    
let mainBalance=userData.mainBalance||0;    
let lockedBalance=userData.lockedBalance||0;    
const robotPurchased=!!userData.robotPurchased;    
    
userBalanceEl.innerText=`Balance: $${mainBalance} | Locked: $${lockedBalance}`;    
    
if(robotPurchased){    
purchaseBtn.innerText="Robot active now";    
purchaseBtn.classList.add("active");    
purchaseBtn.disabled=true;    
}    
    
plansContainer.innerHTML="";    
    
plans.forEach(plan=>{    
const div=document.createElement("div");    
div.className="plan-card";    
div.innerHTML=`    
<strong>${plan.pair}</strong>    
<div>Invest $${plan.price} → Earn $${plan.payout}</div>    
<div class="countdown" id="cd-${plan.pair}"></div>    
<button class="trade-btn ${!robotPurchased?'disabled':''}" id="btn-${plan.pair}">Trade Now</button>`;    
plansContainer.appendChild(div);    
});    
    
const payoutsSnap=await get(payoutsRef);    
    
if(payoutsSnap.exists()){    
    
for(const [id,p] of Object.entries(payoutsSnap.val())){    
    
const btn=document.getElementById(`btn-${p.pair}`);    
const cdEl=document.getElementById(`cd-${p.pair}`);    
    
if(!p.claimed && Date.now()>=p.maturity){    
    
await update(userRef,{    
mainBalance:mainBalance+p.amount,    
lockedBalance:lockedBalance-p.amount    
});    
    
await update(ref(db,"payouts/"+user.uid+"/"+id),{    
claimed:true,    
completed:true    
});    
    
mainBalance+=p.amount;    
lockedBalance-=p.amount;    
    
notify(`${p.pair} trade completed. Profit credited.`);    
    
if(btn){    
btn.innerText="Completed";    
btn.classList.add("disabled");    
btn.disabled=true;    
}    
    
if(cdEl) cdEl.innerText="Trade completed";    
    
}    
    
if(!p.claimed){    
    
if(btn){    
btn.innerText="Trade is ongoing";    
btn.classList.add("active");    
btn.disabled=true;    
}    
    
const updateCountdown=()=>{    
const remaining=p.maturity-Date.now();    
if(remaining>0){    
const hrs=Math.floor(remaining/3600000);    
const mins=Math.floor((remaining%3600000)/60000);    
const secs=Math.floor((remaining%60000)/1000);    
cdEl.innerText=`⏱ ${hrs}h ${mins}m ${secs}s remaining`;    
}else{    
cdEl.innerText="Trade finishing...";    
}    
};    
    
updateCountdown();    
setInterval(updateCountdown,1000);    
    
}    
    
if(p.completed){    
if(btn){    
btn.innerText="Completed";    
btn.classList.add("disabled");    
btn.disabled=true;    
}    
}    
    
}    
    
}    
    
plans.forEach(plan=>{    
const btn=document.getElementById(`btn-${plan.pair}`);    
    
btn.onclick=async()=>{    
    
if(!robotPurchased) return notify("Buy robot first");    
    
const snap=await get(userRef);    
const u=snap.val()||{};    
    
const balance=u.mainBalance||0;    
const locked=u.lockedBalance||0;    
    
if(balance<plan.price) return notify("Insufficient balance");    
    
const refId=push(payoutsRef);    
    
await set(refId,{    
pair:plan.pair,    
amount:plan.payout,    
maturity:Date.now()+plan.days*86400000,    
claimed:false,    
completed:false    
});    
    
await update(userRef,{    
mainBalance:balance-plan.price,    
lockedBalance:locked+plan.payout    
});    
    
notify("Trade started");    
location.reload();    
    
};    
    
});    
    
purchaseBtn.onclick=async()=>{    
    
if(robotPurchased) return;    
    
if(mainBalance<150) return notify("Insufficient balance");    
    
await update(userRef,{    
mainBalance:mainBalance-150,    
robotPurchased:true    
});    
    
notify("Robot activated");    
location.reload();    
    
};    
    
});    
    
</script>    
</body>    
</html>
