<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account – NEXAFUND</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  font-family:Inter,system-ui,sans-serif;
  height:100vh;
  overflow:hidden; /* 🔥 NO SCROLL */
  background:
    radial-gradient(circle at 20% 0%, rgba(16,185,129,0.12), transparent 40%),
    radial-gradient(circle at 80% 100%, rgba(59,130,246,0.12), transparent 40%),
    linear-gradient(to bottom,#0f172a,#020617);
}

/* Card */
.card{
  background:rgba(2,6,23,0.85);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:18px;
  box-shadow:0 20px 50px rgba(0,0,0,.6);
}

/* Inputs */
input{
  background:#020617;
  border:1px solid #334155;
  color:#f9fafb;
  transition:.2s;
}

input:focus{
  outline:none;
  border-color:#10b981;
  box-shadow:0 0 0 2px rgba(16,185,129,.15);
}

/* Button */
.btn{
  background:linear-gradient(to right,#10b981,#059669);
  box-shadow:0 10px 25px rgba(16,185,129,.25);
  transition:.2s;
}

.btn:hover{
  transform:translateY(-1px);
}

.btn:active{
  transform:scale(0.97);
}

/* Toast */
.toast{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#020617;
  padding:12px 24px;
  border-radius:12px;
  box-shadow:0 20px 40px rgba(0,0,0,.8);
  display:none;
  font-weight:700;
  z-index:1000;
  text-align:center;
  border:1px solid rgba(255,255,255,0.08);
}
</style>

</head>

<body class="flex items-center justify-center text-white px-3">

<div class="card w-full max-w-xs p-4"> <!-- 🔥 SMALLER CARD -->

  <!-- BRAND -->
  <div class="text-center mb-3">
    <h1 class="text-xl font-extrabold text-emerald-400">NEXAFUND</h1>
    <p class="text-gray-400 text-[10px] mt-1">Secure Digital Investment Platform</p>
  </div>

  <!-- TITLE -->
  <div class="text-center mb-3">
    <h2 class="text-sm font-bold">Create Account</h2>
    <p class="text-gray-400 text-[10px] mt-1">Start investing with structured strategies</p>
  </div>

  <!-- FORM -->
  <div class="space-y-2">

    <div>
      <label class="block text-[9px] uppercase text-gray-400 mb-1">Full Name</label>
      <input id="name" class="w-full h-9 px-3 rounded-md" placeholder="John Doe">
    </div>

    <div>
      <label class="block text-[9px] uppercase text-gray-400 mb-1">Email Address</label>
      <input id="email" type="email" class="w-full h-9 px-3 rounded-md" placeholder="you@email.com">
    </div>

    <div>
      <label class="block text-[9px] uppercase text-gray-400 mb-1">Phone Number</label>
      <input id="phone" class="w-full h-9 px-3 rounded-md" placeholder="+254712345678">
      <div class="text-[9px] text-gray-500 mt-1">Include country code</div>
    </div>

    <div>
      <label class="block text-[9px] uppercase text-gray-400 mb-1">Password</label>
      <input id="password" type="password" class="w-full h-9 px-3 rounded-md">
    </div>

    <div>
      <label class="block text-[9px] uppercase text-gray-400 mb-1">Confirm Password</label>
      <input id="confirmPassword" type="password" class="w-full h-9 px-3 rounded-md">
    </div>

    <div>
      <label class="block text-[9px] uppercase text-gray-400 mb-1">Referral Code</label>
      <input id="referral" class="w-full h-9 px-3 rounded-md" placeholder="NX-XXXX">
    </div>

  </div>

  <!-- BUTTON -->
  <button id="registerBtn" class="btn mt-4 w-full h-10 rounded-lg font-extrabold text-xs">
    Create Account
  </button>

  <!-- TRUST NOTE -->
  <p class="text-center mt-2 text-[10px] text-gray-500">
    Your data is securely encrypted
  </p>

  <!-- LOGIN -->
  <p class="text-center mt-2 text-[10px] text-gray-400">
    Already have an account?
    <a href="login.html" class="text-emerald-400 font-semibold">Login</a>
  </p>

</div>

<div id="toast" class="toast"></div>

<!-- 🔥 YOUR ORIGINAL LOGIC (UNCHANGED) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyDaEphuY2kQue8m-20DDs68JDgQirAycBE",
  authDomain:"digital-wallet-40297.firebaseapp.com",
  databaseURL:"https://digital-wallet-40297-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"digital-wallet-40297"
});

const auth = getAuth(app);
const db = getDatabase(app);
const toast = document.getElementById("toast");

const registerBtn = document.getElementById("registerBtn");
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const phoneInput = document.getElementById("phone");
const passwordInput = document.getElementById("password");
const confirmPasswordInput = document.getElementById("confirmPassword");
const referralInput = document.getElementById("referral");

function showToast(msg, ok=true){
  toast.innerText = msg;
  toast.style.display = "block";
  toast.style.color = ok?"#10b981":"#ef4444";
  setTimeout(()=>toast.style.display="none",3000);
}

function genCode(){ return Math.random().toString(36).substring(2,8).toUpperCase(); }

registerBtn.onclick = async () => {
  const name = nameInput.value.trim();
  const email = emailInput.value.trim();
  const phone = phoneInput.value.trim();
  const pass = passwordInput.value;
  const pass2 = confirmPasswordInput.value;
  const refCode = referralInput.value.trim().toUpperCase();

  if(!name||!email||!phone||!pass||!pass2){ showToast("Please complete all required fields",false); return; }
  if(pass!==pass2){ showToast("Passwords do not match",false); return; }

  if(!/^\+\d{6,15}$/.test(phone)){
    showToast("Phone number must start with + and include country code", false);
    return;
  }

  try{
    const cred = await createUserWithEmailAndPassword(auth,email,pass);
    const uid = cred.user.uid;
    const myCode = genCode();

    let referredBy = null;

    if(refCode){
      const refSnap = await get(ref(db,"public/refCodes/"+refCode));
      if(refSnap.exists()){
        referredBy = refSnap.val();
      } else {
        showToast("Referral code invalid", false);
        return;
      }
    }

    await set(ref(db,"users/"+uid),{
  uid,
  name,
  email,
  phone,

  balance: 0,
  lockedBalance: 0,

  refCode: myCode,
  referredBy: referredBy || "",

  createdAt: Date.now()
});

    await set(ref(db,"public/refCodes/"+myCode), uid);
    if(referredBy){
      const refUserRef = ref(db,"users/"+referredBy);
      const refUserSnap = await get(refUserRef);
      if(refUserSnap.exists()){
        const refUser = refUserSnap.val();
        const newBalance = (refUser.referralBalance || 0) + 6;
        await update(refUserRef,{ referralBalance:newBalance });
      }
    }

    showToast("Account created successfully");
    setTimeout(()=>location.href="dashboard.html",1200);

  }catch(e){
    if(e.code === "auth/email-already-in-use"){ showToast("Email already in use", false); }
    else if(e.code === "auth/invalid-email"){ showToast("Invalid email address", false); }
    else if(e.code === "auth/weak-password"){ showToast("Password is too weak", false); }
    else{ showToast(e.message,false); }
  }
};
</script>

</body>
</html>
