<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaction History</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
  background: #0f172a;
  color: white;
  font-family: Inter, sans-serif;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 25px;
}

.title {
  text-align: center;
  font-size: 34px;
  font-weight: bold;
  color: #10b981;
  margin-bottom: 35px;
}

.section {
  color: #94a3b8;
  font-weight: bold;
  margin-top: 30px;
  margin-bottom: 15px;
  text-transform: uppercase;
  font-size: 16px;
}

.card {
  background: #1e293b;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 15px;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  transition: all 0.3s ease;
  border-left: 4px solid transparent;
}

.card.deposit { border-left-color: #10b981; }
.card.withdraw { border-left-color: #3b82f6; }

.card:hover {
  background: #273549;
  transform: translateY(-2px);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 16px;
}

.card-header .left {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
}

.badge {
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  text-transform: capitalize;
}

.badge.approved { background-color: #22c55e; color: #fff; }
.badge.pending { background-color: #f59e0b; color: #fff; }
.badge.rejected { background-color: #ef4444; color: #fff; }

.card-details {
  margin-top: 15px;
  background: #273549;
  padding: 15px;
  border-radius: 12px;
  display: none;
  animation: fadeIn 0.3s ease;
}

.card-details p {
  margin: 6px 0;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-details p b { margin-right: 5px; }

.copy-btn {
  background: #10b981;
  color: white;
  border: none;
  padding: 3px 8px;
  font-size: 12px;
  border-radius: 6px;
  cursor: pointer;
}

.copy-btn:hover { background: #059669; }

@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
</style>
</head>

<body>
<div class="container">
  <div class="title">Transaction History</div>

  <div class="section">Deposits</div>
  <div id="depositContainer">Loading...</div>

  <div class="section">Withdrawals</div>
  <div id="withdrawContainer">Loading...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyDaEphuY2kQue8m-20DDs68JDgQirAycBE",
  authDomain:"digital-wallet-40297.firebaseapp.com",
  databaseURL:"https://digital-wallet-40297-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"digital-wallet-40297"
});

const auth = getAuth(app);
const db = getDatabase(app);

const depositContainer = document.getElementById("depositContainer");
const withdrawContainer = document.getElementById("withdrawContainer");

function formatDate(ts) { return new Date(ts).toLocaleString(); }

function getStatusClass(status){
  if(!status) return "pending";
  status = status.toLowerCase();
  if(status==="approved") return "approved";
  if(status==="pending") return "pending";
  if(status==="rejected") return "rejected";
  return "";
}

function getMethod(tx){
  if(tx.receivingAddressType==="TRC20") return "USDT TRC20";
  if(tx.receivingAddressType==="ERC20") return "USDT ERC20";
  if(tx.phoneNumber) return "Mobile Money";
  return "USDT";
}

function createCard(tx,type){
  const card = document.createElement("div");
  card.className = `card ${type}`;
  const status = tx.status || "pending";
  const method = getMethod(tx);

  card.innerHTML = `
    <div class="card-header">
      <div class="left">${method}</div>
      <div class="font-bold">$${Number(tx.amount).toFixed(2)}</div>
      <span class="badge ${getStatusClass(status)}">${status}</span>
    </div>
    <div class="card-details">
      ${type==="deposit" ? `
        <p><b>Amount Deposited:</b> $${Number(tx.amount).toFixed(2)}</p>
        <p><b>Date & Time:</b> ${formatDate(tx.timestamp)}</p>
        <p><b>Method:</b> ${method}</p>
        <p class="status"><b>Status:</b> ${status}</p>
      ` : `
        <p><b>Amount Withdrawn:</b> $${Number(tx.amount).toFixed(2)}</p>
        <p><b>Method:</b> ${method}</p>
        ${tx.receivingAddress ? `
          <p><b>Wallet Address:</b> 
            <span style="color:#22c55e">${tx.receivingAddress}</span>
            <button class="copy-btn" onclick="navigator.clipboard.writeText('${tx.receivingAddress}')">Copy</button>
          </p>` : ""}
        ${tx.phoneNumber ? `<p><b>Network:</b> ${tx.network}</p><p><b>Phone Number:</b> ${tx.phoneNumber}</p>` : ""}
        <p class="status"><b>Status:</b> ${status}</p>
      `}
    </div>
  `;

  card.addEventListener("click", () => {
    const details = card.querySelector(".card-details");
    details.style.display = details.style.display === "block" ? "none" : "block";
    card.scrollIntoView({behavior:"smooth", block:"center"});
  });

  return card;
}

onAuthStateChanged(auth, user => {
  if(!user){ location.href="login.html"; return; }

  const depRef = ref(db, "deposits/"+user.uid);
  onValue(depRef, snap => {
    depositContainer.innerHTML = "";
    if(!snap.exists()){ depositContainer.innerHTML="<p class='text-gray-400'>No deposits</p>"; return; }
    Object.values(snap.val()).sort((a,b)=>b.timestamp-a.timestamp).forEach(tx=>depositContainer.appendChild(createCard(tx,"deposit")));
  });

  const witRef = ref(db, "withdrawals/"+user.uid);
  onValue(witRef, snap => {
    withdrawContainer.innerHTML = "";
    if(!snap.exists()){ withdrawContainer.innerHTML="<p class='text-gray-400'>No withdrawals</p>"; return; }
    Object.values(snap.val()).sort((a,b)=>b.timestamp-a.timestamp).forEach(tx=>withdrawContainer.appendChild(createCard(tx,"withdraw")));
  });
});
</script>
</body>
</html>
