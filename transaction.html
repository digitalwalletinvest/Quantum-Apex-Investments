<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transactions - Quantum Apex</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0f172a; font-family:Inter,sans-serif; color:white; }
.container { max-width:900px; margin:2rem auto; padding:1rem; }
h2 { text-align:center; margin-bottom:1.5rem; color:#10b981; font-weight:bold; font-size:1.8rem; }

.card { border-radius:14px; padding:1rem 1.5rem; margin-bottom:1rem;
    cursor:pointer; transition: transform .2s, box-shadow .2s; display:flex; flex-direction:column; }
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,.5); }

.card-header { display:flex; justify-content:space-between; align-items:center; }
.card-header h3 { font-weight:bold; color:#cbd5f5; font-size:16px; display:flex; align-items:center; gap:6px; }
.card-header span { font-weight:bold; }

.card-body { margin-top:0.5rem; display:none; border-top:1px solid #334155; padding-top:0.5rem; }
.card-body p { margin:4px 0; color:#cbd5f5; font-size:14px; display:flex; align-items:center; gap:6px; }

.section-title { font-size:15px; font-weight:bold; color:#94a3b8; margin-top:1rem; margin-bottom:.5rem; }
.method-icon { width:20px; height:20px; }

.status-approved { background:#1f3321; border-left:4px solid #22c55e; }
.status-rejected { background:#3d1f1f; border-left:4px solid #ef4444; }
.status-pending { background:#3a2f1f; border-left:4px solid #a16207; }
.trc-label { font-size:12px; color:#10b981; font-weight:bold; display:inline-block; }
</style>
</head>
<body>

<div class="container">
<h2>Transaction History</h2>

<div class="section-title">Deposits</div>
<div id="depositContainer">
  <p class="text-slate-400 text-center">Loading...</p>
</div>

<div class="section-title">Withdrawals</div>
<div id="withdrawContainer">
  <p class="text-slate-400 text-center">Loading...</p>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
    apiKey:"AIzaSyDaEphuY2kQue8m-20DDs68JDgQirAycBE",
    authDomain:"digital-wallet-40297.firebaseapp.com",
    databaseURL:"https://digital-wallet-40297-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:"digital-wallet-40297"
});

const auth = getAuth(app);
const db = getDatabase(app);

const depositContainer = document.getElementById("depositContainer");
const withdrawContainer = document.getElementById("withdrawContainer");

function formatDate(ts){ return new Date(ts).toLocaleString(); }

function getStatusClass(status){
    const s = status.toLowerCase();
    if(s==="approved") return "status-approved";
    if(s==="rejected") return "status-rejected";
    if(s==="pending") return "status-pending";
    return "";
}

// USDT icon with TRC20 label (works reliably)
function getMethodIcon(method){
    if(method==="crypto" || method==="usdt") {
        return `
        <img src="https://cryptologos.cc/logos/tether-usdt-logo.svg?v=025" class="method-icon" title="USDT (TRC20)">
        <span class="trc-label">TRC20</span>`;
    }
    return ''; // No icon for mobile/Airtel
}

function createCard(tx){
    const card = document.createElement("div");
    card.className = "card " + getStatusClass(tx.status);

    let displayMethod = tx.method;
    if(tx.method === "mobile") displayMethod = "Airtel Mobile Money";

    const icon = getMethodIcon(tx.method);

    const bodyDetails = tx.method==="crypto" || tx.method==="usdt" ?
        `<p>${icon} Wallet Address: ${tx.details}</p>` :
        `<p>Mobile Number: ${tx.details}</p>`;

    card.innerHTML = `
    <div class="card-header">
        <h3>${icon}${displayMethod || "N/A"}</h3>
        <span>$${tx.amount.toFixed(2)}</span>
    </div>
    <div class="card-body">
        <p>Time: ${formatDate(tx.timestamp)}</p>
        <p>Status: ${tx.status}</p>
        ${bodyDetails}
    </div>
    `;

    card.querySelector(".card-header").onclick = () => {
        const body = card.querySelector(".card-body");
        body.style.display = body.style.display==="block"?"none":"block";
    }

    return card;
}

onAuthStateChanged(auth, user => {
    if(!user) location.href="login.html";

    const depositsRef = ref(db,"deposits/"+user.uid);
    onValue(depositsRef, snap=>{
        depositContainer.innerHTML = "";
        if(!snap.exists()){
            depositContainer.innerHTML = `<p class="text-center text-slate-400">No transactions</p>`;
            return;
        }
        Object.values(snap.val()).sort((a,b)=>b.timestamp-a.timestamp)
        .forEach(tx => depositContainer.appendChild(createCard(tx)));
    });

    const withdrawRef = ref(db,"withdrawals/"+user.uid);
    onValue(withdrawRef, snap=>{
        withdrawContainer.innerHTML = "";
        if(!snap.exists()){
            withdrawContainer.innerHTML = `<p class="text-center text-slate-400">No transactions</p>`;
            return;
        }
        Object.values(snap.val()).sort((a,b)=>b.timestamp-a.timestamp)
        .forEach(tx => withdrawContainer.appendChild(createCard(tx)));
    });
});
</script>
</body>
</html>
