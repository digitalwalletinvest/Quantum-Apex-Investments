<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Transactions</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Inter, sans-serif;
}

.container{
max-width:850px;
margin:auto;
padding:25px;
}

.title{
text-align:center;
font-size:28px;
font-weight:bold;
color:#10b981;
margin-bottom:25px;
}

.section{
color:#94a3b8;
font-weight:bold;
margin-top:25px;
margin-bottom:10px;
}

.card{
background:#1e293b;
border-radius:12px;
padding:14px;
margin-bottom:10px;
cursor:pointer;
transition:.2s;
}

.card:hover{
background:#273549;
}

.card-body{
display:none;
border-top:1px solid #334155;
margin-top:10px;
padding-top:10px;
font-size:14px;
color:#cbd5f5;
}

.deposit{
border-left:4px solid #22c55e;
}

.withdraw{
border-left:4px solid #ef4444;
}

.status-approved{
color:#22c55e;
}

.status-pending{
color:#f59e0b;
}

.status-rejected{
color:#ef4444;
}

</style>

</head>

<body>

<div class="container">

<div class="title">
Transaction History
</div>

<div class="section">Deposits</div>
<div id="depositContainer">Loading...</div>

<div class="section">Withdrawals</div>
<div id="withdrawContainer">Loading...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase,ref,onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyDaEphuY2kQue8m-20DDs68JDgQirAycBE",
authDomain:"digital-wallet-40297.firebaseapp.com",
databaseURL:"https://digital-wallet-40297-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"digital-wallet-40297"
});

const auth=getAuth(app);
const db=getDatabase(app);

const depositContainer=document.getElementById("depositContainer");
const withdrawContainer=document.getElementById("withdrawContainer");

function formatDate(ts){
return new Date(ts).toLocaleString();
}

function getStatusClass(status){

if(!status) return "status-pending";

status=status.toLowerCase();

if(status==="approved") return "status-approved";
if(status==="pending") return "status-pending";
if(status==="rejected") return "status-rejected";

return "";
}

function getMethod(tx){

if(tx.walletType==="TRC20") return "USDT TRC20";
if(tx.walletType==="ERC20") return "USDT ERC20";

if(tx.method==="mobile_agent") return "Airtel Money";

return "USDT";

}

function createCard(tx,type){

const card=document.createElement("div");

card.className="card "+(type==="deposit"?"deposit":"withdraw");

const method=getMethod(tx);
const status=tx.status || "pending";

const wallet=tx.walletAddress || tx.address || "N/A";

card.innerHTML=`

<div class="flex justify-between items-center">

<div class="flex items-center gap-2 font-semibold">

${type==="deposit"?"💰":"📤"} ${method}

</div>

<div class="font-bold">

$${Number(tx.amount).toFixed(2)}

</div>

<div class="capitalize text-sm ${getStatusClass(status)}">

${status}

</div>

</div>

<div class="card-body">

<p><b>Type:</b> ${type==="deposit"?"Deposit":"Withdrawal"}</p>

<p><b>Method:</b> ${method}</p>

<p><b>Amount:</b> $${Number(tx.amount).toFixed(2)}</p>

<p><b>Status:</b> ${status}</p>

<p><b>Time:</b> ${formatDate(tx.timestamp)}</p>

${type==="withdraw"?`<p><b>Wallet:</b> ${wallet}</p>`:""}

</div>

`;

card.onclick=()=>{
const body=card.querySelector(".card-body");
body.style.display = body.style.display==="block" ? "none":"block";
}

return card;

}

onAuthStateChanged(auth,user=>{

if(!user){
location.href="login.html";
return;
}

/* Deposits */

const depRef=ref(db,"deposits/"+user.uid);

onValue(depRef,snap=>{

depositContainer.innerHTML="";

if(!snap.exists()){
depositContainer.innerHTML="<p class='text-gray-400'>No deposits</p>";
return;
}

Object.values(snap.val())
.sort((a,b)=>b.timestamp-a.timestamp)
.forEach(tx=>{
depositContainer.appendChild(createCard(tx,"deposit"));
});

});

/* Withdrawals */

const witRef=ref(db,"withdrawals/"+user.uid);

onValue(witRef,snap=>{

withdrawContainer.innerHTML="";

if(!snap.exists()){
withdrawContainer.innerHTML="<p class='text-gray-400'>No withdrawals</p>";
return;
}

Object.values(snap.val())
.sort((a,b)=>b.timestamp-a.timestamp)
.forEach(tx=>{
withdrawContainer.appendChild(createCard(tx,"withdraw"));
});

});

});

</script>

</body>
</html>
