body{

  background:

    radial-gradient(circle at 90% 90%, rgba(59,130,246,0.15), transparent 40%),
    linear-gradient(to bottom, #0f172a, #020617);
}

.glow{
  box-shadow:0 0 40px rgba(16,185,129,.25);
}

/* Cards */
.card{
  background: rgba(15,23,42,0.75);
  backdrop-filter: blur(14px);
  border-radius:20px;
  position:relative;
  overflow:hidden;
  transition:.3s;
  border:1px solid rgba(255,255,255,0.06);
}

.card::before{
  content:"";
  position:absolute;
  inset:-1px;
  border-radius:20px;
  background:linear-gradient(120deg,#10b981,transparent,#3b82f6);
  opacity:.15;
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(15,23,42,0.75);
  border-radius:20px;
}

.card > *{
  position:relative;
  z-index:2;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 25px 60px rgba(0,0,0,.5);
}

.card a:active{
  transform:scale(0.96);
}

/* Social */
.social-box{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 16px;
  border-radius:999px;
  background:rgba(255,255,255,0.05);
  transition:.3s;
}

.social-box:hover{
  background:rgba(255,255,255,0.1);
}

.social-icon{
  width:22px;
  height:22px;
}

.facebook{ fill:#1877F2; }
.telegram{ fill:#229ED9; }

.instagram-box{
  background: linear-gradient(45deg, #feda75, #d62976, #4f5bd5);
}

.instagram-icon{
  fill:white;
}

.instagram-box span{
  color:white;
}

a{
  -webkit-tap-highlight-color: transparent;
}
</style>
