<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Deposit - Quantum Apex</title>  
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>  
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>  
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>  
<script src="https://cdn.tailwindcss.com"></script>  

<style>
body {
  background:#0f172a;
  font-family:'Inter',sans-serif;
  position: relative;
}
.toast {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#1e293b;
  padding:20px 40px;
  border-radius:12px;
  box-shadow:0 0 25px rgba(16,185,129,0.4);
  display:none;
  z-index:1000;
  text-align:center;
  color:white;
  font-weight:600;
}
.copy {
  background:#020617;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  word-break:break-all;
  transition: all 0.2s;
}
.copy:hover {
  background:#111827;
  transform:scale(1.02);
}
.trc-label {
  font-size:12px;
  color:#10b981;
  font-weight:bold;
  display:inline-block;
  margin-left:6px;
}
.support-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#10b981;
  color:white;
  padding:15px 20px;
  border-radius:50px;
  font-weight:bold;
  box-shadow:0 5px 15px rgba(16,185,129,0.4);
  z-index:1000;
  transition:all 0.2s;
  text-decoration:none;
  text-align:center;
}
.support-btn:hover {
  background:#059669;
  transform:scale(1.05);
}
</style>
</head>  
<body class="text-white min-h-screen flex flex-col">  

<nav class="flex justify-between items-center px-6 py-4 bg-slate-900 shadow-lg">
  <h1 class="text-2xl font-bold text-emerald-400">Deposit Funds</h1>
  <button onclick="window.location.href='dashboard.html'" class="bg-gray-600 px-4 py-2 rounded hover:bg-gray-700">Back</button>
</nav>

<div class="bg-red-600 text-center py-3 font-semibold">
  ⚠ Minimum Deposit is <span class="text-yellow-300">$50</span>
</div>

<section class="flex-1 p-6 space-y-6">

  <div class="bg-slate-800 p-6 rounded-2xl space-y-4 shadow-lg hover:shadow-2xl transition">
    <h2 class="text-xl font-semibold">Deposit Method</h2>
    <select id="depositMethod" class="w-full p-3 rounded bg-slate-700 border border-gray-600">
      <option value="">Select Method</option>
      <option value="crypto">Crypto (USDT)</option>
      <option value="agent">Mobile Money Agent (Kenya)</option>
    </select>

    <div id="dynamicInput"></div>

    <button id="depositBtn" disabled class="w-full bg-emerald-500 py-3 rounded hover:bg-emerald-600 font-semibold mt-2 opacity-50 cursor-not-allowed transition">
      Confirm Deposit
    </button>
  </div>

  <div class="bg-slate-800 p-6 rounded-2xl shadow-lg hover:shadow-2xl transition">
    <h3 class="font-semibold mb-4">Deposit Instructions</h3>
    <div id="instructions" class="space-y-4 text-sm text-gray-300"></div>
  </div>

  <div class="bg-slate-800 p-6 rounded-2xl shadow-lg hover:shadow-2xl transition">
    <h3 class="font-semibold mb-2">Your Current Balance</h3>
    <p id="currentBalance" class="text-emerald-400 text-2xl">$0.00</p>
  </div>

</section>

<div id="toast" class="toast"></div>
<a href="https://wa.me/254732364593" target="_blank" class="support-btn">Support</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase,ref,onValue,push,set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyDaEphuY2kQue8m-20DDs68JDgQirAycBE",
  authDomain:"digital-wallet-40297.firebaseapp.com",
  databaseURL:"https://digital-wallet-40297-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"digital-wallet-40297"
});

const auth=getAuth(app);
const db=getDatabase(app);

const USDT_ERC20="0xe5e959e57ae1937acf0dde128a8b7ee0aa970168";
const USDT_TRC20="TBHiPNGTw3EmAYQcKznHp2a5RERvT7E72K";

const depositBtn=document.getElementById("depositBtn");
const method=document.getElementById("depositMethod");
const dynamic=document.getElementById("dynamicInput");
const instructions=document.getElementById("instructions");

function showToast(msg){
  const toast=document.getElementById("toast");
  toast.innerText=msg;
  toast.style.display="block";
  setTimeout(()=>toast.style.display="none",3000);
}

function copyText(t){
  navigator.clipboard.writeText(t);
  showToast("Copied to clipboard");
}

method.addEventListener("change",()=>{
  depositBtn.disabled=true;
  depositBtn.classList.add("opacity-50");
  dynamic.innerHTML="";
  instructions.innerHTML="";

  if(method.value==="agent"){
    dynamic.innerHTML=`
      <select id="agentSelect" class="w-full p-3 rounded bg-slate-700 mb-3">
        <option value="">Select Agent</option>
        <option value="Hassan Abdi - 0750858351">Hassan Abdi (0750858351)</option>
      </select>
      <input id="phoneUsed" type="text" placeholder="Enter phone number used to send money"
      class="w-full p-3 rounded bg-slate-700">`;

    instructions.innerHTML=`
      <div>
        <h4 class="text-emerald-400 font-semibold">Kenya Airtel Money Agent</h4>
        <div class="copy">
          Agent Name: Hassan Abdi<br>
          Phone: 0750858351
        </div>
      </div>`;

    const phone=document.getElementById("phoneUsed");
    const agent=document.getElementById("agentSelect");
    phone.addEventListener("input",checkInputs);
    agent.addEventListener("change",checkInputs);
  }

  if(method.value==="crypto"){
    dynamic.innerHTML=`
      <input id="cryptoAmount" type="number" placeholder="Enter amount deposited" min="50"
      class="w-full p-3 rounded bg-slate-700 mb-2">
      <select id="cryptoSelect" class="w-full p-3 rounded bg-slate-700 mb-2">
        <option value="">Select Wallet Type</option>
        <option value="ERC20">USDT ERC20</option>
        <option value="TRC20">USDT TRC20</option>
      </select>
      <div id="walletDisplay" class="copy mb-2"></div>
      <img id="walletQR" class="mt-2 w-40 rounded-lg shadow-lg">`;

    const amount=document.getElementById("cryptoAmount");
    const cryptoType=document.getElementById("cryptoSelect");
    const walletDisplay=document.getElementById("walletDisplay");
    const walletQR=document.getElementById("walletQR");

    amount.addEventListener("input",checkCrypto);
    cryptoType.addEventListener("change",()=>{
      checkCrypto();

      let walletAddress="";
      if(cryptoType.value==="ERC20"){
        walletAddress=USDT_ERC20;
      } else if(cryptoType.value==="TRC20"){
        walletAddress=USDT_TRC20;
      }
      walletDisplay.innerText=walletAddress;
      walletDisplay.onclick=()=>copyText(walletAddress);
      walletQR.src=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${walletAddress}`;
      instructions.innerHTML=`
        <div>
          <h4 class="text-emerald-400 font-semibold">USDT Wallet (${cryptoType.value})</h4>
          <div class="copy" onclick="copyText('${walletAddress}')">${walletAddress}</div>
          <img class="mt-2 w-40 rounded-lg shadow-lg" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${walletAddress}">
          ${cryptoType.value==="TRC20"?'<span class="trc-label">TRC20</span>':''}
        </div>`;
    });
  }
});

function checkInputs(){
  const phone=document.getElementById("phoneUsed")?.value;
  const agent=document.getElementById("agentSelect")?.value;
  if(phone!=="" && agent!==""){
    depositBtn.disabled=false;
    depositBtn.classList.remove("opacity-50");
  }
}

function checkCrypto(){
  const amount=document.getElementById("cryptoAmount")?.value;
  const cryptoType=document.getElementById("cryptoSelect")?.value;
  if(amount!=="" && cryptoType!==""){
    depositBtn.disabled=false;
    depositBtn.classList.remove("opacity-50");
  }
}

depositBtn.addEventListener("click", async ()=>{
  if(!auth.currentUser){
    showToast("Login first");
    return;
  }

  const uid=auth.currentUser.uid;
  let data={userId:uid, timestamp:Date.now(), status:"pending"};

  if(method.value==="crypto"){
    const cryptoType=document.getElementById("cryptoSelect").value;
    const amount=parseFloat(document.getElementById("cryptoAmount").value);
    const walletAddress=cryptoType==="ERC20"?USDT_ERC20:USDT_TRC20;
    data.method="crypto";
    data.walletType=cryptoType;
    data.walletAddress=walletAddress; // <-- Save wallet address
    data.amount=amount;
  }

  if(method.value==="agent"){
    data.method="mobile_agent";
    data.agent=document.getElementById("agentSelect").value;
    data.phone=document.getElementById("phoneUsed").value;
    data.amount=parseFloat(document.getElementById("cryptoAmount")?.value) || 50;
  }

  const depositRef=push(ref(db,`deposits/${uid}`));
  await set(depositRef,data);
  showToast("Deposit submitted. Wait for approval.");
});

onAuthStateChanged(auth, user => {
  if(!user) return;
  const balanceRef=ref(db,`users/${user.uid}/mainBalance`);
  onValue(balanceRef, snap => {
    document.getElementById("currentBalance").innerText=`$${snap.val()||0}`;
  });
});

</script>
</body>
</html>
