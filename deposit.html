<!DOCTYPE html>

<head>

<script src="https://cdn.tailwindcss.com"></script>

<style>

}

.copy{

padding:10px;
border-radius:8px;
cursor:pointer;
word-break:break-all;
}
</style>
</head>

<!-- SUPPORT BUTTON -->
<a href="https://wa.me/254732364593" target="_blank"
class="fixed bottom-6 right-6 bg-emerald-500 hover:bg-emerald-600
text-white px-5 py-3 rounded-full shadow-lg flex items-center gap-2 z-50">

<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 24 24">
<path d="M12.04 2C6.58 2 2.16 6.42 2.16 11.88c0 2.1.55 4.15 1.6 5.96L2 22l4.31-1.72a9.83 9.83 0 0 0 5.73 1.83h.01c5.46 0 9.88-4.42 9.88-9.88S17.5 2 12.04 2z"/>
</svg>

<span class="font-semibold">Contact Support</span>

<body class="text-white min-h-screen flex flex-col">

<nav class="flex justify-between items-center px-6 py-4 bg-slate-900 shadow-lg">

<button onclick="window.location.href='dashboard.html'"
class="bg-gray-600 px-4 py-2 rounded hover:bg-gray-700">
Back
</button>
</nav>

<div class="bg-red-600 text-center py-3 font-semibold">
⚠ Minimum Deposit is <span class="text-yellow-300">$50</span>
</div>

<section class="flex-1 p-6 space-y-6">

<div class="bg-slate-800 p-6 rounded-2xl space-y-4">

<h2 class="text-xl font-semibold">Deposit Method</h2>

<select id="depositMethod" class="w-full p-3 rounded bg-slate-700">
<option value="">Select Method</option>
<option value="crypto">Crypto (USDT ERC20)</option>
<option value="agent">Mobile Money Agent (Kenya)</option>
</select>

<div id="dynamicInput"></div>

<button id="depositBtn" disabled
class="w-full bg-emerald-500 py-3 rounded hover:bg-emerald-600 font-semibold mt-2 opacity-50 cursor-not-allowed">
Confirm Deposit
</button>

</div>

<div class="bg-slate-800 p-6 rounded-2xl">

<h3 class="font-semibold mb-4">Deposit Instructions</h3>

<div id="instructions" class="space-y-4 text-sm text-gray-300">

<div>
<h4 class="text-emerald-400 font-semibold">USDT Wallet (ERC20)</h4>

<div class="copy" onclick="copyText(USDT)">
0xe5e959e57ae1937acf0dde128a8b7ee0aa970168
</div>

<img id="qr" class="mt-4 w-40"
src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=0xe5e959e57ae1937acf0dde128a8b7ee0aa970168">

</div>

<div>

<h4 class="text-emerald-400 font-semibold">Kenya Airtel Money Agent</h4>

<div class="copy">
Agent Name: Hassan Abdi<br>
Phone: 0750858351
</div>

</div>

</div>

</div>

<div class="bg-slate-800 p-6 rounded-2xl">

<h3 class="font-semibold mb-2">Your Current Balance</h3>
<p id="currentBalance" class="text-emerald-400 text-2xl">$0.00</p>

</div>

</section>

<div id="toast" class="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase,ref,onValue,push,set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyDaEphuY2kQue8m-20DDs68JDgQirAycBE",
authDomain:"digital-wallet-40297.firebaseapp.com",
databaseURL:"https://digital-wallet-40297-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"digital-wallet-40297"
});

const auth=getAuth(app);
const db=getDatabase(app);

const USDT="0xe5e959e57ae1937acf0dde128a8b7ee0aa970168";

const depositBtn=document.getElementById("depositBtn");
const method=document.getElementById("depositMethod");
const dynamic=document.getElementById("dynamicInput");

function showToast(msg){
const toast=document.getElementById("toast");
toast.innerText=msg;
toast.style.display="block";
setTimeout(()=>toast.style.display="none",3000);
}

function copyText(t){
navigator.clipboard.writeText(t);
showToast("Wallet copied");
}

method.addEventListener("change",()=>{

depositBtn.disabled=true;
depositBtn.classList.add("opacity-50");

dynamic.innerHTML="";

if(method.value==="agent"){

dynamic.innerHTML=`

<select id="agentSelect" class="w-full p-3 rounded bg-slate-700 mb-3">
<option value="">Select Agent</option>
<option value="Hassan Abdi - 0750858351">Hassan Abdi (0750858351)</option>
</select>

<input id="phoneUsed" type="text"
placeholder="Enter phone number used to send money"
class="w-full p-3 rounded bg-slate-700">

`;

const phone=document.getElementById("phoneUsed");
const agent=document.getElementById("agentSelect");

phone.addEventListener("input",checkInputs);
agent.addEventListener("change",checkInputs);

}

if(method.value==="crypto"){

depositBtn.disabled=false;
depositBtn.classList.remove("opacity-50");

}

});

function checkInputs(){

const phone=document.getElementById("phoneUsed").value;
const agent=document.getElementById("agentSelect").value;

if(phone!=="" && agent!==""){
depositBtn.disabled=false;
depositBtn.classList.remove("opacity-50");
}

}

depositBtn.addEventListener("click",async()=>{

if(!auth.currentUser){
showToast("Login first");
return;
}

const uid=auth.currentUser.uid;

let data={
userId:uid,
timestamp:Date.now(),
status:"pending"
};

if(method.value==="crypto"){
data.method="crypto";
data.amount=50;
}

if(method.value==="agent"){

data.method="mobile_agent";
data.agent=document.getElementById("agentSelect").value;
data.phone=document.getElementById("phoneUsed").value;
data.amount=50;

}

const depositRef=push(ref(db,`deposits/${uid}`));

await set(depositRef,data);

showToast("Deposit submitted. Wait for approval.");

});

onAuthStateChanged(auth,user=>{

if(!user)return;

const balanceRef=ref(db,`users/${user.uid}/mainBalance`);

onValue(balanceRef,snap=>{
document.getElementById("currentBalance").innerText=`$${snap.val()||0}`;
});

});

</script>
</body>
</html>
