<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile – Quantum Apex</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at top, #1e293b, #020617);
  font-family:Inter,system-ui,sans-serif;
  color:#e5e7eb;
}

/* Smaller professional card */
.container{
  width:100%;
  max-width:310px;
  padding:1.4rem 1.2rem;
  background:rgba(2,6,23,.85);
  backdrop-filter:blur(8px);
  border-radius:16px;
  border:1px solid #1f2937;
  box-shadow:
    0 12px 28px rgba(0,0,0,.65),
    inset 0 1px 0 rgba(255,255,255,.03);
}

/* Avatar */
.avatar{
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(135deg,#10b981,#059669);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.6rem;
  margin:0 auto 8px auto;
  color:white;
  font-weight:bold;
}

/* Title */
.profile-title{
  text-align:center;
  font-size:1.35rem;
  font-weight:700;
  color:#10b981;
  margin-bottom:1.2rem;
}

/* Fields */
.field-wrapper{
  position:relative;
  margin-bottom:.9rem;
}

label{
  display:block;
  font-size:.68rem;
  font-weight:600;
  letter-spacing:.3px;
  color:#94a3b8;
  margin-bottom:.25rem;
  text-transform:uppercase;
}

input{
  width:100%;
  height:36px;
  padding:0 .7rem;
  border-radius:10px;
  background:#020617;
  border:1px solid #334155;
  color:#f9fafb;
  font-size:.88rem;
  transition:border .2s, box-shadow .2s;
}

input:focus{
  outline:none;
  border-color:#10b981;
  box-shadow:0 0 0 2px rgba(16,185,129,.15);
}

input[disabled]{
  background:#020617;
  color:#9ca3af;
}

/* edit icon */
.edit-icon{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#10b981;
  font-size:.9rem;
  opacity:.75;
}
.edit-icon:hover{opacity:1}

/* divider */
.action-divider{
  height:1px;
  width:100%;
  background:linear-gradient(to right, transparent, #1f2937, transparent);
  margin:1.2rem 0 .8rem;
}

/* buttons */
button{
  height:38px;
  width:100%;
  border-radius:10px;
  font-weight:600;
  font-size:.85rem;
  transition:all .25s ease;
}

#saveBtn{
  background:linear-gradient(135deg,#10b981,#059669);
  color:#ecfdf5;
  box-shadow:0 6px 14px rgba(16,185,129,.25);
}

#saveBtn:hover{
  transform:translateY(-1px);
  box-shadow:0 10px 20px rgba(16,185,129,.35);
}

#logout{
  margin-top:.6rem;
  background:transparent;
  border:1px solid #374151;
  color:#9ca3af;
}

#logout:hover{
  border-color:#ef4444;
  color:#ef4444;
}

/* toast */
.toast{
  position:fixed;
  bottom:1.5rem;
  left:50%;
  transform:translateX(-50%);
  background:#020617;
  padding:10px 20px;
  border-radius:10px;
  box-shadow:0 12px 25px rgba(0,0,0,.7);
  display:none;
  font-weight:600;
  z-index:1000;
}
</style>
</head>

<body>

<div class="container">

<div class="avatar">👤</div>
<div class="profile-title">Account Profile</div>

<div class="field-wrapper">
<label>Account ID</label>
<input id="accountId" disabled>
</div>

<div class="field-wrapper">
<label>Full Name</label>
<input id="name" disabled>
<span class="edit-icon" id="editName">✎</span>
</div>

<div class="field-wrapper">
<label>Email Address</label>
<input id="email" disabled>
</div>

<div class="field-wrapper">
<label>Phone Number</label>
<input id="phone" disabled>
<span class="edit-icon" id="editPhone">✎</span>
</div>

<div class="field-wrapper">
<label>Country</label>
<input id="country" disabled>
</div>

<div class="action-divider"></div>

<button id="saveBtn">Save Changes</button>
<button id="logout">Sign Out</button>

</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyDaEphuY2kQue8m-20DDs68JDgQirAycBE",
  authDomain:"digital-wallet-40297.firebaseapp.com",
  databaseURL:"https://digital-wallet-40297-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"digital-wallet-40297"
});

const auth = getAuth(app);
const db = getDatabase(app);

const accountId = document.getElementById("accountId");
const name = document.getElementById("name");
const email = document.getElementById("email");
const phone = document.getElementById("phone");
const country = document.getElementById("country");
const toast = document.getElementById("toast");

editName.onclick = () => { name.disabled=false; name.focus(); };
editPhone.onclick = () => { phone.disabled=false; phone.focus(); };

function showToast(msg, ok=true){
  toast.innerText = msg;
  toast.style.display="block";
  toast.style.color = ok ? "#10b981" : "#ef4444";
  setTimeout(()=>toast.style.display="none",3000);
}

function generateAccountId(uid){ return "QA-" + uid.slice(-6).toUpperCase(); }

let userRef;
onAuthStateChanged(auth,user=>{
  if(!user) location.href="login.html";
  userRef = ref(db,"users/"+user.uid);

  onValue(userRef,snap=>{
    if(!snap.exists()) return;
    const d = snap.val();

    if(!d.accountId){
      const id=generateAccountId(user.uid);
      update(userRef,{accountId:id});
      accountId.value=id;
    } else accountId.value=d.accountId;

    name.value=d.name||"";
    email.value=d.email||"";
    phone.value=d.phone||"";
    country.value=d.country||"";
  });
});

saveBtn.onclick=()=>{
  const updates={};
  if(!name.disabled) updates.name=name.value.trim();
  if(!phone.disabled) updates.phone=phone.value.trim();

  if(!Object.keys(updates).length){
    showToast("No changes to save",false);
    return;
  }

  update(userRef,updates)
    .then(()=>{
      showToast("Profile updated");
      name.disabled=true;
      phone.disabled=true;
    })
    .catch(()=>showToast("Update failed",false));
};

logout.onclick=()=>signOut(auth).then(()=>location.href="login.html");
</script>

</body>
</html>
