<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
.container{max-width:900px;margin:auto;padding:1.5rem}
.card{background:#1e293b;border-radius:18px;padding:2rem;box-shadow:0 6px 18px rgba(0,0,0,0.4)}
.title{font-size:22px;font-weight:bold}
.subtitle{color:#94a3b8;margin-top:.8rem}
.highlight{color:#22c55e}
.ref-box{background:#0f172a;border-radius:12px;padding:1rem;margin-top:1rem;display:flex;justify-content:space-between;align-items:center}
.ref-value{font-weight:bold;color:#38bdf8}
.copy-btn{background:#2563eb;color:white;padding:.5rem 1rem;border-radius:8px;cursor:pointer;border:none}
.balance-card{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#0ea5e9,#22c55e);border-radius:16px;padding:1.5rem;margin-top:1.5rem}
.balance-amount{font-size:28px;font-weight:bold}
.referred-list{margin-top:1.5rem;background:#1e293b;border-radius:12px;padding:1rem}
.referred-user{display:flex;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid #334155}
.user-email{color:#38bdf8}
.status-deposit{color:#22c55e;font-weight:bold}
.status-pending{color:#facc15;font-weight:bold}
.back-btn{position:fixed;top:1rem;right:1rem;background:#ef4444;color:white;border:none;padding:.6rem 1.2rem;border-radius:10px;cursor:pointer}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e293b;color:#facc15;padding:1rem 2rem;border-radius:12px;font-weight:bold;display:none}
</style>
</head>

<body>

<button class="back-btn" onclick="location.href='dashboard.html'">Back</button>

<div class="container">
<div class="card">

<div class="title">🎁 Referral Program</div>

<p class="subtitle">
Invite friends to <strong>Quantum Apex</strong>.<br>
When they register using your referral code and make their first deposit you earn
<span class="highlight">$4 instantly</span>.
</p>

<div class="ref-box">
<div>
<div>Your Referral Code</div>
<div class="ref-value" id="code">—</div>
</div>
<button class="copy-btn" id="copyBtn">Copy Code</button>
</div>

<div class="balance-card">
<div>Referral Earnings</div>
<div class="balance-amount">$<span id="balance">0</span></div>
</div>

<div class="referred-list">
<h3>Referred Users</h3>
<div id="usersContainer"></div>
</div>

</div>
</div>

<div id="toast" class="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase,ref,onValue,query,orderByChild,equalTo,update,get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyDaEphuY2kQue8m-20DDs68JDgQirAycBE",
authDomain:"digital-wallet-40297.firebaseapp.com",
databaseURL:"https://digital-wallet-40297-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"digital-wallet-40297"
});

const auth=getAuth(app);
const db=getDatabase(app);
const toast=document.getElementById("toast");

function showNotification(msg){
toast.innerText=msg;
toast.style.display="block";
setTimeout(()=>{toast.style.display="none"},2500);
}

onAuthStateChanged(auth,user=>{
if(!user) return;

const userRef=ref(db,"users/"+user.uid);

onValue(userRef,snap=>{
const data=snap.val()||{};
document.getElementById("code").innerText=data.referralCode||"—";
document.getElementById("balance").innerText=data.referralBalance||0;
});

const referredQuery=query(ref(db,"users"),orderByChild("referredBy"),equalTo(user.uid));

onValue(referredQuery,snap=>{

const usersContainer=document.getElementById("usersContainer");
usersContainer.innerHTML="";

let totalReferral=0;

snap.forEach(uSnap=>{

const u=uSnap.val();
const email=u.email||"Unknown";

/* FIXED DEPOSIT CHECK */
const deposited=(u.mainBalance||0)>0 || (u.totalDeposited||0)>0;

const rewarded=u.referralRewarded;

const div=document.createElement("div");
div.classList.add("referred-user");

div.innerHTML=`
<span class="user-email">${email}</span>
<span class="${deposited?'status-deposit':'status-pending'}">
${deposited?'Deposited':'Pending'}
</span>
`;

usersContainer.appendChild(div);

if(deposited){
totalReferral+=4;

if(!rewarded){

get(ref(db,"users/"+user.uid)).then(s=>{
const data=s.val()||{};
const newBalance=(data.mainBalance||0)+4;

update(ref(db,"users/"+user.uid),{
mainBalance:newBalance
});

update(ref(db,"users/"+uSnap.key),{
referralRewarded:true
});

showNotification("🎉 Referral deposited! $4 credited");
});

}

}

});

update(userRef,{referralBalance:totalReferral});

document.getElementById("balance").innerText=totalReferral;

});

});

document.getElementById("copyBtn").addEventListener("click",()=>{
const codeText=document.getElementById("code").innerText;
navigator.clipboard.writeText(codeText);
showNotification("Referral code copied!");
});

</script>
