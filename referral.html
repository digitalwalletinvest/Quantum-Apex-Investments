<style>
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:
    radial-gradient(circle at 10% 10%, rgba(16,185,129,0.12), transparent 40%),
    radial-gradient(circle at 90% 90%, rgba(59,130,246,0.12), transparent 40%),
    linear-gradient(to bottom,#0f172a,#020617);
  color:white;
}

.container{max-width:900px;margin:auto;padding:1.5rem}

/* Glass card */
.card{
  backdrop-filter:blur(12px);
  background:rgba(15,23,42,0.75);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:18px;
  padding:2rem;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}

/* Referral box */
.ref-box{
  background:#020617;
  border-radius:12px;
  padding:1rem;
  margin-top:1rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid rgba(255,255,255,0.08);
}

.copy-btn{
  background:#2563eb;
  padding:.5rem 1rem;
  border-radius:8px;
}

/* Balance */
.balance-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(135deg,#0ea5e9,#22c55e);
  border-radius:16px;
  padding:1.5rem;
  margin-top:1.5rem;
}

.balance-amount{
  font-size:28px;
  font-weight:bold;
}

/* List */
.referred-list{
  margin-top:1.5rem;
  background:rgba(15,23,42,0.7);
  border-radius:12px;
  padding:1rem;
}

.referred-user{
  display:flex;
  justify-content:space-between;
  padding:.6rem 0;
  border-bottom:1px solid #334155;
}

.user-email{color:#38bdf8}
.status-deposit{color:#22c55e;font-weight:bold}
.status-pending{color:#facc15;font-weight:bold}

.back-btn{
  position:fixed;
  top:1rem;
  right:1rem;
  background:#ef4444;
  padding:.6rem 1.2rem;
  border-radius:10px;
  z-index:9999; /* 🔥 FIX: bring it above everything */
  box-shadow:0 6px 18px rgba(0,0,0,0.4);
  cursor:pointer;
    }

/* Toast */
.toast{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#020617;
  padding:14px 28px;
  border-radius:14px;
  display:none;
  font-weight:bold;
  z-index:1000;
}
</style>
</head>

<body>

<button class="back-btn" onclick="location.href='dashboard.html'">Back</button>

<div class="container">
<div class="card">

<div class="text-xl font-bold">🎁 Referral Program</div>

<p class="text-gray-400 mt-2">
Invite friends to <strong>Quantum Apex</strong>.<br>
Earn <span class="text-emerald-400 font-semibold">$4 instantly</span> when they deposit.
</p>

<div class="ref-box">
<div>
<div class="text-sm text-gray-400">Your Referral Code</div>
<div class="font-bold text-sky-400" id="code">—</div>
</div>
<button class="copy-btn" id="copyBtn">Copy</button>
</div>

<div class="balance-card">
<div>Referral Earnings</div>
<div class="balance-amount">$<span id="balance">0</span></div>
</div>

<div class="referred-list">
<h3 class="mb-2 font-semibold">Referred Users</h3>
<div id="usersContainer"></div>
</div>

</div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
/* 🔒 YOUR LOGIC — UNCHANGED */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase,ref,onValue,query,orderByChild,equalTo,update,get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyDaEphuY2kQue8m-20DDs68JDgQirAycBE",
authDomain:"digital-wallet-40297.firebaseapp.com",
databaseURL:"https://digital-wallet-40297-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"digital-wallet-40297"
});

const auth=getAuth(app);
const db=getDatabase(app);
const toast=document.getElementById("toast");

function showNotification(msg){
toast.innerText=msg;
toast.style.display="block";
setTimeout(()=>{toast.style.display="none"},2500);
}

onAuthStateChanged(auth,user=>{
if(!user) return;

const userRef=ref(db,"users/"+user.uid);

onValue(userRef,snap=>{
const data=snap.val()||{};
document.getElementById("code").innerText=data.referralCode||"—";
document.getElementById("balance").innerText=data.referralBalance||0;
});

const referredQuery=query(ref(db,"users"),orderByChild("referredBy"),equalTo(user.uid));

onValue(referredQuery,snap=>{

const usersContainer=document.getElementById("usersContainer");
usersContainer.innerHTML="";

let totalReferral=0;

snap.forEach(uSnap=>{

const u=uSnap.val();
const email=u.email||"Unknown";

const deposited=(u.mainBalance||0)>0 || (u.totalDeposited||0)>0;
const rewarded=u.referralRewarded;

const div=document.createElement("div");
div.classList.add("referred-user");

div.innerHTML=`
<span class="user-email">${email}</span>
<span class="${deposited?'status-deposit':'status-pending'}">
${deposited?'Deposited':'Pending'}
</span>
`;

usersContainer.appendChild(div);

if(deposited){
totalReferral+=4;

if(!rewarded){

get(ref(db,"users/"+user.uid)).then(s=>{
const data=s.val()||{};
const newBalance=(data.mainBalance||0)+4;

update(ref(db,"users/"+user.uid),{
mainBalance:newBalance
});

update(ref(db,"users/"+uSnap.key),{
referralRewarded:true
});

showNotification("🎉 Referral deposited! $4 credited");
});

}

}

});

update(userRef,{referralBalance:totalReferral});
document.getElementById("balance").innerText=totalReferral;

});

});

document.getElementById("copyBtn").addEventListener("click",()=>{
const codeText=document.getElementById("code").innerText;
navigator.clipboard.writeText(codeText);
showNotification("Referral code copied!");
});
</script>
