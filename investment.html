<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Investments - Quantum Apex</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; background:#0f172a; }

.toast{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#1e293b;
  padding:20px 40px;
  border-radius:12px;
  box-shadow:0 0 25px rgba(16,185,129,0.4);
  display:none;
  z-index:1000;
  color:white;
  text-align:center;
}

.progress-bar-container{
  background:#1e293b;
  border-radius:6px;
  width:100%;
  height:10px;
  margin-top:5px;
}

.progress-bar{
  background:#10b981;
  height:100%;
  border-radius:6px;
  width:0%;
  transition:width .4s linear;
}

.progress-bar.gold{
  background:gold;
}

.card{
  background:#1e293b;
  border-radius:12px;
  padding:1rem;
  margin-bottom:1rem;
}
</style>
</head>

<body class="text-white min-h-screen flex flex-col">

<nav class="flex justify-between items-center px-6 py-4 bg-slate-900 shadow-lg">
  <h1 class="text-2xl font-bold text-emerald-400">My Investments</h1>
  <button onclick="window.location.href='dashboard.html'" class="bg-gray-600 px-4 py-2 rounded hover:bg-gray-700">Back</button>
</nav>

<section class="flex-1 p-6 space-y-6">

  <div class="bg-slate-800 p-6 rounded-2xl space-y-4">
    <h2 class="text-xl font-semibold text-emerald-400">Active Investments</h2>
    <div id="activeInvestments">Loading...</div>
  </div>

  <div class="bg-slate-800 p-6 rounded-2xl space-y-4">
    <h2 class="text-xl font-semibold text-yellow-400">Completed Investments</h2>
    <div id="completedInvestments"></div>
  </div>

  <div class="bg-slate-800 p-6 rounded-2xl space-y-4">
    <h2 class="text-xl font-semibold text-emerald-400">Ongoing Trades (Robots)</h2>
    <div id="trades">Loading...</div>
  </div>

</section>

<div id="toast" class="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase,ref,onValue,update,get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig={
  apiKey:"AIzaSyDaEphuY2kQue8m-20DDs68JDgQirAycBE",
  authDomain:"digital-wallet-40297.firebaseapp.com",
  databaseURL:"https://digital-wallet-40297-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"digital-wallet-40297"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getDatabase(app);

function showToast(msg){
  const toast=document.getElementById("toast");
  toast.innerText=msg;
  toast.style.display="block";
  setTimeout(()=>toast.style.display="none",3000);
}

function formatTime(ms){
  const total=Math.max(ms,0);
  const d=Math.floor(total/(1000*60*60*24));
  const h=Math.floor((total%(1000*60*60*24))/(1000*60*60));
  const m=Math.floor((total%(1000*60*60))/(1000*60));
  const s=Math.floor((total%(1000*60))/1000);
  return `${d}d ${h}h ${m}m ${s}s`;
}

onAuthStateChanged(auth,user=>{
  if(!user){ window.location.href="login.html"; return; }

  const investmentsRef=ref(db,`investments/${user.uid}`);
  const payoutsRef=ref(db,`payouts/${user.uid}`);
  const balanceRef=ref(db,`users/${user.uid}/balance`);

  const activeIntervals={};
  const tradeIntervals={};

  // Investments listener
  onValue(investmentsRef,snapshot=>{
    const activeDiv=document.getElementById("activeInvestments");
    const completedDiv=document.getElementById("completedInvestments");

    snapshot.forEach(child=>{
      const inv=child.val();
      const id=child.key;
      const start=Number(inv.startTime);
      const durationMs=(inv.durationDays||7)*86400000;
      const end=start+durationMs;

      // Completed investments
      if(inv.status==="completed"){
        if(!document.getElementById(`completed-${id}`)){
          const div=document.createElement("div");
          div.id=`completed-${id}`;
          div.className="card";
          div.innerHTML=`
            <div class="font-semibold">${inv.planName}</div>
            <div class="text-gray-400">Amount: $${inv.amount} | ROI: ${inv.roi}% | Payout: $${inv.payout}</div>
            <div class="text-yellow-400 text-sm mt-1">Completed ✔</div>`;
          completedDiv.appendChild(div);
        }
        return;
      }

      // Active investments
      if(!document.getElementById(`active-${id}`)){
        const div=document.createElement("div");
        div.id=`active-${id}`;
        div.className="card";
        div.innerHTML=`
          <div class="font-semibold">${inv.planName}</div>
          <div class="text-gray-400">Amount: $${inv.amount} | ROI: ${inv.roi}% | Payout: $${inv.payout}</div>
          <div class="progress-bar-container"><div class="progress-bar" id="progress-${id}"></div></div>
          <div class="text-gray-400 text-xs mt-1" id="time-${id}"></div>`;
        activeDiv.appendChild(div);
      }

      const progressEl=document.getElementById(`progress-${id}`);
      const timeEl=document.getElementById(`time-${id}`);

      if(activeIntervals[id]) clearInterval(activeIntervals[id]);
      async function updateTimer(){
        const now=Date.now();
        const elapsed=now-start;
        const percent=Math.min((elapsed/durationMs)*100,100);
        progressEl.style.width=percent+"%";

        const remaining=end-now;
        if(remaining>0){
          timeEl.innerText="Time remaining: "+formatTime(remaining);
        } else {
          timeEl.innerText="Investment completed";
          progressEl.classList.add("gold");

          const invRef=ref(db,`investments/${user.uid}/${id}`);
          const snap=await get(invRef);
          const data=snap.val();
          if(data.status!=="completed"){
            const balSnap=await get(balanceRef);
            const currentBal=balSnap.val()||0;
            await update(balanceRef, currentBal+Number(data.payout));
            await update(invRef,{status:"completed"});
            showToast(`Profit $${data.payout} credited`);

            const divCompleted=document.createElement("div");
            divCompleted.id=`completed-${id}`;
            divCompleted.className="card";
            divCompleted.innerHTML=`
              <div class="font-semibold">${data.planName}</div>
              <div class="text-gray-400">Amount: $${data.amount} | ROI: ${data.roi}% | Payout: $${data.payout}</div>
              <div class="text-yellow-400 text-sm mt-1">Completed ✔</div>`;
            completedDiv.appendChild(divCompleted);
            document.getElementById(`active-${id}`)?.remove();
          }
        }
      }
      updateTimer();
      activeIntervals[id]=setInterval(updateTimer,1000);
    });
  });

  // Trades listener
  onValue(payoutsRef,snapshot=>{
    const tradesDiv=document.getElementById("trades");

    snapshot.forEach(child=>{
      const trade=child.val();
      const id=child.key;

      if(document.getElementById(`trade-${id}`)) return;

      const start=Number(trade.timestamp||Date.now());
      const durationMs=3*86400000;

      const div=document.createElement("div");
      div.id=`trade-${id}`;
      div.className="card";
      div.innerHTML=`
        <div class="font-semibold">Robot Trade: ${trade.pair||"Auto Trade"}</div>
        <div class="text-gray-400">Amount: $${trade.amount} | Status: ${trade.status||'Trading...'}</div>
        <div class="progress-bar-container"><div class="progress-bar" id="trade-progress-${id}"></div></div>
        <div class="text-gray-400 text-xs mt-1" id="trade-time-${id}"></div>`;
      tradesDiv.appendChild(div);

      const progressEl=document.getElementById(`trade-progress-${id}`);
      const timeEl=document.getElementById(`trade-time-${id}`);

      if(tradeIntervals[id]) clearInterval(tradeIntervals[id]);
      function updateTrade(){
        const now = Date.now();
        const elapsed = now - start;
        const percent = Math.min((elapsed/durationMs)*100,100);
        progressEl.style.width = percent + "%";

        const remaining = durationMs - elapsed;
        if(remaining>0){
          timeEl.innerText = "Time remaining: " + formatTime(remaining);
        } else {
          timeEl.innerText = "Trade completed";
          progressEl.classList.add("gold");
        }
      }
      updateTrade();
      tradeIntervals[id]=setInterval(updateTrade,1000);
    });
  });

});
</script>

</body>
</html>
