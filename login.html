<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login – NEXAFUND</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  font-family:Inter,system-ui,sans-serif;
  height:100vh;
  overflow:hidden;
  background:
    radial-gradient(circle at 20% 0%, rgba(16,185,129,0.12), transparent 40%),
    radial-gradient(circle at 80% 100%, rgba(59,130,246,0.12), transparent 40%),
    linear-gradient(to bottom,#0f172a,#020617);
}

/* Card */
.card{
  background:rgba(2,6,23,0.9);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:18px;
  box-shadow:0 25px 60px rgba(0,0,0,.6);
}

/* Inputs */
input{
  background:#020617;
  border:1px solid #334155;
  color:#f9fafb;
  transition:.2s;
}

input:focus{
  outline:none;
  border-color:#10b981;
  box-shadow:0 0 0 2px rgba(16,185,129,.15);
}

/* Button */
.btn{
  background:linear-gradient(to right,#10b981,#059669);
  box-shadow:0 10px 25px rgba(16,185,129,.25);
  transition:.2s;
}

.btn:hover{
  transform:translateY(-1px);
}

.btn:active{
  transform:scale(0.97);
}

/* Toast */
.toast{
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #020617;
  padding: 14px 28px;
  border-radius: 12px;
  box-shadow: 0 20px 40px rgba(0,0,0,.8);
  display: none;
  z-index: 1000;
  font-weight: bold;
  text-align:center;
  border:1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body class="flex items-center justify-center text-white px-3">

<div class="card w-full max-w-xs p-5">

  <!-- BRAND -->
  <div class="text-center mb-4">
    <h1 class="text-xl font-extrabold text-emerald-400">NEXAFUND</h1>
    <p class="text-gray-400 text-[10px] mt-1">
      Secure Digital Investment Platform
    </p>
  </div>

  <!-- TITLE -->
  <div class="text-center mb-4">
    <h2 class="text-sm font-bold">Login</h2>
    <p class="text-gray-400 text-[10px] mt-1">
      Access your account
    </p>
  </div>

  <!-- FORM -->
  <div class="space-y-3">

    <div>
      <label class="block text-[9px] uppercase tracking-wide text-gray-400 mb-1">
        Email Address
      </label>
      <input id="email" type="email"
        class="w-full h-9 px-3 rounded-md"
        placeholder="you@email.com">
    </div>

    <div>
      <label class="block text-[9px] uppercase tracking-wide text-gray-400 mb-1">
        Password
      </label>
      <input id="password" type="password"
        class="w-full h-9 px-3 rounded-md"
        placeholder="••••••••">
    </div>

  </div>

  <button onclick="login()"
    class="btn mt-4 w-full h-10 rounded-lg font-extrabold text-xs tracking-wide">
    Login
  </button>

  <!-- TRUST NOTE -->
  <p class="text-center mt-3 text-[10px] text-gray-500">
    Your connection is encrypted and secure.
  </p>

  <p class="text-center mt-2 text-[10px] text-gray-400">
    Don't have an account?
    <a href="register.html"
       class="text-emerald-400 font-semibold hover:underline">
      Register
    </a>
  </p>

</div>

<div id="toast" class="toast"></div>

<!-- FIREBASE (UNCHANGED LOGIC) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaEphuY2kQue8m-20DDs68JDgQirAycBE",
  authDomain: "digital-wallet-40297.firebaseapp.com",
  projectId: "digital-wallet-40297",
  storageBucket: "digital-wallet-40297.firebasestorage.app",
  messagingSenderId: "953454788272",
  appId: "1:953454788272:android:961fd704f587cf1b8c8575"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function showToast(message, success=true) {
  const toast = document.getElementById("toast");
  toast.innerText = message;
  toast.style.display = "block";
  toast.style.border = success ? "2px solid #10b981" : "2px solid red";
  setTimeout(() => { toast.style.display = "none"; }, 3000);
}

window.login = async function(){

  const emailVal = email.value.trim();
  const passVal  = password.value.trim();

  if(!emailVal || !passVal){
    showToast("Please fill the fields", false);
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, emailVal, passVal);
    showToast("Login Successful");
    setTimeout(()=> window.location.href="dashboard.html",1500);

  } catch(error) {

    if (error.code === "auth/user-not-found" || error.code === "auth/wrong-password") {
      showToast("Invalid credentials", false);
    } else if (error.code === "auth/too-many-requests") {
      showToast("Too many attempts, try again later", false);
    } else {
      showToast("Invalid credentials", false);
    }

  }
}
</script>

</body>
  </html>
